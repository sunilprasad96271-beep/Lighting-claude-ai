<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lighting Claude AI</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background: radial-gradient(circle at 50% 30%, #141a26 0%, #0a0e17 70%);
  color: #e8eef5;
  font-family: Inter, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  text-align: center;
}
h1{
  font-family: Orbitron, sans-serif;
  font-size: 32px;
  color: #ffa726;
  text-shadow: 0 0 20px rgba(255,167,38,0.5);
  letter-spacing: 3px;
  margin-bottom: 10px;
}
p.sub{
  color: #8a94a6;
  margin-bottom: 40px;
  font-size: 14px;
  letter-spacing: 1px;
}
.cards{
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
}
.card{
  background: #10151f;
  border: 1px solid #2a3344;
  border-radius: 16px;
  padding: 30px;
  width: 240px;
  text-decoration: none;
  color: #e8eef5;
  transition: .3s;
}
.card:hover{
  border-color: #ffa726;
  box-shadow: 0 0 25px rgba(255,167,38,0.2);
  transform: translateY(-4px);
}
.card .icon{ font-size: 36px; margin-bottom: 14px; }
.card h2{ font-family: Orbitron, sans-serif; font-size: 14px; letter-spacing: 1px; margin-bottom: 8px; }
.card p{ font-size: 12px; color: #8a94a6; }
</style>
</head>
<body>

<h1>⚡ LIGHTING CLAUDE AI</h1>
<p class="sub">Developer Multi-AI Workspace</p>

<div class="cards">
  <a class="card" href="hud.html">
    <div class="icon">🎛️</div>
    <h2>HUD DASHBOARD</h2>
    <p>Theme-switchable circular HUD interface</p>
  </a>

  <a class="card" href="missioncontrol.html">
    <div class="icon">📡</div>
    <h2>MISSION CONTROL</h2>
    <p>Radar tracking style command center</p>
  </a>
</div>

</body>
</html>
